<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #F5F5F7; --card-bg: #FFFFFF; --card-inner: #F9F9FB; --border: #E5E5EA;
      --hover: #F2F2F7; --text-primary: #1D1D1F; --text-secondary: #6E6E73;
      --text-tertiary: #AEAEB2; --pill-bg: #F2F2F7; --pill-color: #6E6E73;
      --pill-active-bg: #1D1D1F; --pill-active-color: #FFFFFF; --accent: #007AFF;
      --accent-subtle: #007AFF0A; --tag-bg: #F2F2F7; --tag-color: #6E6E73; --input-bg: #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000; --card-bg: #1C1C1E; --card-inner: #2C2C2E; --border: #38383A;
        --hover: #2C2C2E; --text-primary: #F5F5F7; --text-secondary: #A1A1A6;
        --text-tertiary: #636366; --pill-bg: #2C2C2E; --pill-color: #A1A1A6;
        --pill-active-bg: #F5F5F7; --pill-active-color: #1D1D1F; --accent: #0A84FF;
        --accent-subtle: #0A84FF12; --tag-bg: #2C2C2E; --tag-color: #A1A1A6; --input-bg: #2C2C2E;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    function Dashboard() {
      const [section, setSection] = useState("news");
      const [newsTab, setNewsTab] = useState("world");
      
      const newsData = [
        { title: "Global Leaders Meet at G20 Summit", source: "Reuters", time: "2h ago", tag: "World" },
        { title: "Federal Reserve Signals Cautious Approach on Rates", source: "Bloomberg", time: "1h ago", tag: "Monetary" },
        { title: "Major Tech Acquisition Announced at $12B", source: "Bloomberg", time: "1h ago", tag: "M&A" },
      ];
      
      return (
        <div style={{ minHeight: "100vh", background: "var(--bg)", padding: "32px 28px" }}>
          <div style={{ maxWidth: 720, margin: "0 auto" }}>
            <h1 style={{ fontSize: 32, fontWeight: 700, marginBottom: 24, letterSpacing: "-0.02em" }}>Good Morning.</h1>
            
            <div style={{ background: "var(--card-bg)", borderRadius: 20, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
              <div style={{ padding: "20px", borderBottom: "1px solid var(--border)" }}>
                <h2 style={{ fontSize: 18, fontWeight: 600, marginBottom: 16 }}>📰 News</h2>
                {newsData.map((item, i) => (
                  <div key={i} style={{ padding: "14px 0", borderTop: i > 0 ? "1px solid var(--border)" : "none" }}>
                    <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 6 }}>{item.title}</div>
                    <div style={{ fontSize: 12, color: "var(--text-tertiary)" }}>
                      {item.source} · {item.time}
                    </div>
                  </div>
                ))}
              </div>
              
              <div style={{ padding: "20px", textAlign: "center", color: "var(--text-secondary)" }}>
                <p>✅ Your dashboard is live and ready!</p>
                <p style={{ fontSize: 12, marginTop: 8 }}>Click to expand sections to see full content.</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    
    ReactDOM.render(<Dashboard />, document.getElementById('root'));
  </script>
</body>
</html>
